name: E2E

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.18"
  OTP_VERSION: "28"

jobs:
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: secrethub
          POSTGRES_PASSWORD: secrethub_test_password
          POSTGRES_DB: secrethub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      PGUSER: secrethub
      PGPASSWORD: secrethub_test_password
      SECRET_KEY_BASE: "e2e-test-only-key-base-must-be-at-least-64-characters-long-do-not-use-in-prod!!"
      AUDIT_HMAC_SECRET: "e2e-test-audit-hmac-secret"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/test
          key: e2e-${{ runner.os }}-otp${{ env.OTP_VERSION }}-elixir${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            e2e-${{ runner.os }}-otp${{ env.OTP_VERSION }}-elixir${{ env.ELIXIR_VERSION }}-

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Setup PostgreSQL extensions
        run: |
          PGPASSWORD=secrethub_test_password psql -h localhost -U secrethub -d secrethub_test -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"
          PGPASSWORD=secrethub_test_password psql -h localhost -U secrethub -d secrethub_test -c "CREATE EXTENSION IF NOT EXISTS \"pgcrypto\";"

      - name: Run migrations
        run: mix ecto.migrate

      - name: Run E2E tests
        run: mix test apps/secrethub_web/test/e2e/ --include e2e --trace --max-failures 3

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ github.run_id }}
          path: |
            _build/test/lib/*/logs/
          retention-days: 5
