name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0, 1.0.0-rc6)'
        required: true
        type: string
      git-rev:
        description: 'Git revision to release from (branch, tag, or SHA)'
        required: false
        type: string
        default: 'main'

env:
  ELIXIR_VERSION: '1.18'
  OTP_VERSION: '28'
  MIX_ENV: 'prod'
  VERSION: v${{ inputs.version }}

jobs:
  # Job 1: Build Core Release (tar.gz)
  build-core-release:
    name: Build Core Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git-rev }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-prod-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-prod-

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod

      - name: Compile application
        run: mix compile

      - name: Build frontend assets
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost/dummy"
          SECRET_KEY_BASE: "build-only-placeholder-key-base-must-be-64-chars-long-at-minimum-for-phoenix!!"
        run: |
          mix assets.setup
          mix assets.deploy

      - name: Build Core release
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost/dummy"
          SECRET_KEY_BASE: "build-only-placeholder-key-base-must-be-64-chars-long-at-minimum-for-phoenix!!"
        run: |
          mix release secrethub_core

      - name: Create release tarball
        run: |
          cd _build/prod/rel/secrethub_core
          tar -czf ../../../../secrethub_core-${{ env.VERSION }}.tar.gz .
          cd ../../../..

      - name: Upload Core release artifact
        uses: actions/upload-artifact@v4
        with:
          name: secrethub-core-release
          path: secrethub_core-${{ env.VERSION }}.tar.gz
          retention-days: 7

  # Job 2: Build Agent Release (tar.gz)
  build-agent-release:
    name: Build Agent Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git-rev }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-prod-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-prod-

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod

      - name: Compile application
        run: mix compile

      - name: Build Agent release
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost/dummy"
          SECRET_KEY_BASE: "build-only-placeholder-key-base-must-be-64-chars-long-at-minimum-for-phoenix!!"
        run: |
          mix release secrethub_agent

      - name: Create release tarball
        run: |
          cd _build/prod/rel/secrethub_agent
          tar -czf ../../../../secrethub_agent-${{ env.VERSION }}.tar.gz .
          cd ../../../..

      - name: Upload Agent release artifact
        uses: actions/upload-artifact@v4
        with:
          name: secrethub-agent-release
          path: secrethub_agent-${{ env.VERSION }}.tar.gz
          retention-days: 7

  # Job 3: Build Core Docker Image
  build-core-docker:
    name: Build Core Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git-rev }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Core Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.core
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/core:${{ env.VERSION }}
            ghcr.io/${{ github.repository }}/core:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # Job 4: Build Agent Docker Image
  build-agent-docker:
    name: Build Agent Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git-rev }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Agent Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.agent
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/agent:${{ env.VERSION }}
            ghcr.io/${{ github.repository }}/agent:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # Job 5: Build Core Standalone Docker Image (includes PostgreSQL)
  build-core-standalone-docker:
    name: Build Core Standalone Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git-rev }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Core Standalone Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.core-standalone
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/core-standalone:${{ env.VERSION }}
            ghcr.io/${{ github.repository }}/core-standalone:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # Final Job: Create tag and GitHub Release with all artifacts
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-core-release, build-agent-release, build-core-docker, build-agent-docker, build-core-standalone-docker]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git-rev }}

      - name: Create and push tag
        run: |
          git tag ${{ env.VERSION }}
          git push origin ${{ env.VERSION }}

      - name: Download Core release artifact
        uses: actions/download-artifact@v4
        with:
          name: secrethub-core-release

      - name: Download Agent release artifact
        uses: actions/download-artifact@v4
        with:
          name: secrethub-agent-release

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${{ env.VERSION }}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG_LINK="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${VERSION}"
          else
            CHANGELOG_LINK="**Full Changelog**: https://github.com/${{ github.repository }}/commits/${VERSION}"
          fi
          cat > release_notes.md <<EOF
          # SecretHub ${VERSION}

          ## 📦 Release Artifacts

          ### Binary Releases
          - **Core Service**: \`secrethub_core-${VERSION}.tar.gz\`
          - **Agent Daemon**: \`secrethub_agent-${VERSION}.tar.gz\`

          ### Docker Images
          - **Core**: \`ghcr.io/${{ github.repository }}/core:${VERSION}\`
          - **Core Standalone** (with PostgreSQL): \`ghcr.io/${{ github.repository }}/core-standalone:${VERSION}\`
          - **Agent**: \`ghcr.io/${{ github.repository }}/agent:${VERSION}\`

          ## 🚀 Quick Start

          ### Using Binary Releases
          \`\`\`bash
          # Extract and run Core service
          tar -xzf secrethub_core-${VERSION}.tar.gz
          cd secrethub_core
          ./bin/secrethub_core start

          # Extract and run Agent
          tar -xzf secrethub_agent-${VERSION}.tar.gz
          cd secrethub_agent
          ./bin/secrethub_agent start
          \`\`\`

          ### Using Docker Images
          \`\`\`bash
          # Run Core service
          docker run -d -p 4000:4000 \\
            ghcr.io/${{ github.repository }}/core:${VERSION}

          # Run Core Standalone (includes PostgreSQL, no external DB needed)
          docker run -d -p 4000:4000 \\
            -v secrethub-data:/data \\
            -e SECRET_KEY_BASE=\$(openssl rand -base64 48) \\
            ghcr.io/${{ github.repository }}/core-standalone:${VERSION}

          # Run Agent
          docker run -d \\
            -e AGENT_ID=my-agent \\
            -e CORE_URL=ws://core:4000 \\
            ghcr.io/${{ github.repository }}/agent:${VERSION}
          \`\`\`

          ## 📝 Changes

          See the commit history for detailed changes.

          ## 🔒 Security

          Please report security vulnerabilities to security@gsmlg.dev

          ---

          ${CHANGELOG_LINK}
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          body_path: release_notes.md
          files: |
            secrethub_core-${{ env.VERSION }}.tar.gz
            secrethub_agent-${{ env.VERSION }}.tar.gz
          draft: false
          prerelease: ${{ contains(env.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "## 🎉 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ env.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts Published:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Core Release (tar.gz)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Agent Release (tar.gz)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Core Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Core Standalone Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Agent Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Images:" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository }}/core:${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository }}/core-standalone:${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository }}/agent:${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
