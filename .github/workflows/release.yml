name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0, 1.0.0-rc6)'
        required: true
        type: string
      git-rev:
        description: 'Branch to release from; the workflow pushes the version bump to this branch'
        required: false
        type: string
        default: 'main'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ELIXIR_VERSION: '1.18'
  OTP_VERSION: '28'
  MIX_ENV: 'prod'
  BUILD_DATABASE_URL: 'postgresql://dummy:dummy@localhost/dummy'
  BUILD_SECRET_KEY_BASE: 'build-only-placeholder-key-base-must-be-64-chars-long-at-minimum-for-phoenix!!'

jobs:
  prepare-release:
    name: Prepare Release Commit
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      release_sha: ${{ steps.bump.outputs.release_sha }}
      prerelease: ${{ steps.release.outputs.prerelease }}

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs['git-rev'] }}
          fetch-depth: 0

      - name: Normalize version and branch
        id: release
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          TAG="v${VERSION}"
          REF="${{ inputs['git-rev'] }}"
          BRANCH="${REF#refs/heads/}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version must look like 1.2.3 or 1.2.3-rc1. Build metadata is not supported because Docker tags cannot contain '+'."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists on origin."
            exit 1
          fi

          if ! git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "::error::Release source '$REF' must be a branch so the workflow can push the version bump."
            exit 1
          fi

          git checkout -B "$BRANCH" "origin/$BRANCH"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump project versions
        id: bump
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
          BRANCH: ${{ steps.release.outputs.branch }}
        run: |
          set -euo pipefail

          version_files=(
            mix.exs
            apps/secrethub_core/mix.exs
            apps/secrethub_web/mix.exs
            apps/secrethub_agent/mix.exs
            apps/secrethub_shared/mix.exs
            apps/secrethub_cli/mix.exs
          )

          for file in "${version_files[@]}"; do
            perl -0pi -e 's/version: "[^"]+"/version: "'"${VERSION}"'"/' "$file"
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "${version_files[@]}"; then
            echo "Versions already set to ${VERSION}."
          else
            git add "${version_files[@]}"
            git commit -m "chore(release): ${TAG}"
            git push origin "HEAD:${BRANCH}"
          fi

          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish-cli-hex:
    name: Publish CLI to Hex.pm
    runs-on: ubuntu-24.04
    needs:
      - prepare-release
      - build-core-release
      - build-agent-release
      - build-agent-freebsd
      - build-docker-images
    permissions:
      contents: read

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-${{ runner.arch }}-mix-prod-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-mix-prod-

      - name: Install dependencies
        shell: bash
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod

      - name: Publish package
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${HEX_API_KEY:-}" ]; then
            echo "::error::Set the HEX_API_KEY repository secret before running the release workflow."
            exit 1
          fi

          cd apps/secrethub_cli
          mix hex.publish package --yes

  build-core-release:
    name: Build Core Release (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: prepare-release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-24.04
          - target: linux-arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            apps/secrethub_web/node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-mix-core-prod-${{ hashFiles('**/mix.lock', 'bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-mix-core-prod-

      - name: Install dependencies
        shell: bash
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod
          cd apps/secrethub_web
          bun install

      - name: Compile application
        env:
          DATABASE_URL: ${{ env.BUILD_DATABASE_URL }}
          SECRET_KEY_BASE: ${{ env.BUILD_SECRET_KEY_BASE }}
        run: mix compile

      - name: Build frontend assets
        env:
          DATABASE_URL: ${{ env.BUILD_DATABASE_URL }}
          SECRET_KEY_BASE: ${{ env.BUILD_SECRET_KEY_BASE }}
        run: mix assets.deploy

      - name: Build Core release
        env:
          DATABASE_URL: ${{ env.BUILD_DATABASE_URL }}
          SECRET_KEY_BASE: ${{ env.BUILD_SECRET_KEY_BASE }}
        run: mix release secrethub_core

      - name: Package Core release
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          artifact="secrethub_core-${RELEASE_TAG}-${RELEASE_TARGET}.tar.gz"
          tar -C _build/prod/rel/secrethub_core -czf "$artifact" .

      - name: Upload Core release artifact
        uses: actions/upload-artifact@v4
        with:
          name: secrethub-core-${{ matrix.target }}
          path: secrethub_core-${{ needs.prepare-release.outputs.tag }}-${{ matrix.target }}.tar.gz
          retention-days: 7

  build-agent-release:
    name: Build Agent Release (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: prepare-release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-24.04
            archive: tar.gz
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - target: macos-amd64
            runner: macos-26-intel
            archive: tar.gz
          - target: macos-arm64
            runner: macos-26
            archive: tar.gz
          - target: windows-amd64
            runner: windows-2025
            archive: zip

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-${{ runner.arch }}-mix-agent-prod-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-mix-agent-prod-

      - name: Install dependencies
        shell: bash
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod

      - name: Compile application
        env:
          DATABASE_URL: ${{ env.BUILD_DATABASE_URL }}
          SECRET_KEY_BASE: ${{ env.BUILD_SECRET_KEY_BASE }}
        run: mix compile

      - name: Build Agent release
        env:
          DATABASE_URL: ${{ env.BUILD_DATABASE_URL }}
          SECRET_KEY_BASE: ${{ env.BUILD_SECRET_KEY_BASE }}
        run: mix release secrethub_agent

      - name: Package Agent tarball
        if: ${{ matrix.archive == 'tar.gz' }}
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          artifact="secrethub_agent-${RELEASE_TAG}-${RELEASE_TARGET}.tar.gz"
          tar -C _build/prod/rel/secrethub_agent -czf "$artifact" .

      - name: Package Agent zip
        if: ${{ matrix.archive == 'zip' }}
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_TARGET: ${{ matrix.target }}
        run: |
          $artifact = "secrethub_agent-$env:RELEASE_TAG-$env:RELEASE_TARGET.zip"
          Compress-Archive -Path "_build/prod/rel/secrethub_agent/*" -DestinationPath $artifact -Force

      - name: Upload Agent release artifact
        uses: actions/upload-artifact@v4
        with:
          name: secrethub-agent-${{ matrix.target }}
          path: secrethub_agent-${{ needs.prepare-release.outputs.tag }}-${{ matrix.target }}.${{ matrix.archive }}
          retention-days: 7

  build-agent-freebsd:
    name: Build Agent Release (freebsd-amd64)
    runs-on: ubuntu-24.04
    needs: prepare-release
    permissions:
      contents: read

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Build inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "15.0"
          usesh: true
          sync: rsync
          copyback: true
          prepare: |
            pkg install -y erlang-runtime28 elixir git gmake bash curl
          run: |
            set -e
            export PATH="/usr/local/lib/erlang28/bin:$PATH"
            export MIX_ENV=prod
            export DATABASE_URL="${{ env.BUILD_DATABASE_URL }}"
            export SECRET_KEY_BASE="${{ env.BUILD_SECRET_KEY_BASE }}"
            export RELEASE_TAG="${{ needs.prepare-release.outputs.tag }}"

            mix local.hex --force
            mix local.rebar --force
            mix deps.get --only prod
            mix compile
            mix release secrethub_agent
            tar -C _build/prod/rel/secrethub_agent -czf "secrethub_agent-${RELEASE_TAG}-freebsd-amd64.tar.gz" .

      - name: Upload FreeBSD Agent release artifact
        uses: actions/upload-artifact@v4
        with:
          name: secrethub-agent-freebsd-amd64
          path: secrethub_agent-${{ needs.prepare-release.outputs.tag }}-freebsd-amd64.tar.gz
          retention-days: 7

  build-docker-images:
    name: Build Docker Image (${{ matrix.image }})
    runs-on: ubuntu-24.04
    needs: prepare-release
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: core
            dockerfile: Dockerfile.core
            title: SecretHub Core
          - image: core-standalone
            dockerfile: Dockerfile.core-standalone
            title: SecretHub Core Standalone
          - image: agent
            dockerfile: Dockerfile.agent
            title: SecretHub Agent

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ needs.prepare-release.outputs.tag }}
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:sha-${{ needs.prepare-release.outputs.release_sha }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.version=${{ needs.prepare-release.outputs.tag }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.prepare-release.outputs.release_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - prepare-release
      - publish-cli-hex
      - build-core-release
      - build-agent-release
      - build-agent-freebsd
      - build-docker-images
    permissions:
      contents: write

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}
          fetch-depth: 0

      - name: Create and push tag
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare-release.outputs.release_sha }}
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Tag $RELEASE_TAG already exists on origin."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" "$RELEASE_SHA" -m "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: secrethub-*
          merge-multiple: true

      - name: Generate release notes
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare-release.outputs.release_sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          PREV_TAG="$(git describe --tags --abbrev=0 "${RELEASE_SHA}^" 2>/dev/null || true)"
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG_LINK="Full changelog: https://github.com/${REPOSITORY}/compare/${PREV_TAG}...${RELEASE_TAG}"
          else
            CHANGELOG_LINK="Commit history: https://github.com/${REPOSITORY}/commits/${RELEASE_TAG}"
          fi

          cat > release_notes.md <<EOF
          # SecretHub ${RELEASE_TAG}

          ## Artifacts

          ### Core releases
          - \`secrethub_core-${RELEASE_TAG}-linux-amd64.tar.gz\`
          - \`secrethub_core-${RELEASE_TAG}-linux-arm64.tar.gz\`

          ### Agent releases
          - \`secrethub_agent-${RELEASE_TAG}-linux-amd64.tar.gz\`
          - \`secrethub_agent-${RELEASE_TAG}-linux-arm64.tar.gz\`
          - \`secrethub_agent-${RELEASE_TAG}-macos-amd64.tar.gz\`
          - \`secrethub_agent-${RELEASE_TAG}-macos-arm64.tar.gz\`
          - \`secrethub_agent-${RELEASE_TAG}-windows-amd64.zip\`
          - \`secrethub_agent-${RELEASE_TAG}-freebsd-amd64.tar.gz\`

          ### Docker images
          - \`ghcr.io/${REPOSITORY}/core:${RELEASE_TAG}\`
          - \`ghcr.io/${REPOSITORY}/core-standalone:${RELEASE_TAG}\`
          - \`ghcr.io/${REPOSITORY}/agent:${RELEASE_TAG}\`

          ## Deploy SecretHub Core

          ### Docker with external PostgreSQL

          \`\`\`bash
          docker run -d --name secrethub-core \\
            -p 4664:4664 \\
            -e PHX_HOST=secrethub.example.com \\
            -e SECRET_KEY_BASE="\$(openssl rand -base64 48)" \\
            -e DATABASE_URL="postgresql://secrethub:password@postgres/secrethub_prod" \\
            ghcr.io/${REPOSITORY}/core:${RELEASE_TAG}
          \`\`\`

          ### Docker standalone

          \`\`\`bash
          docker run -d --name secrethub-core \\
            -p 4737:4737 \\
            -v secrethub-data:/data \\
            -e PHX_HOST=localhost \\
            -e SECRET_KEY_BASE="\$(openssl rand -base64 48)" \\
            ghcr.io/${REPOSITORY}/core-standalone:${RELEASE_TAG}
          \`\`\`

          ### Linux release tarball

          \`\`\`bash
          tar -xzf secrethub_core-${RELEASE_TAG}-linux-amd64.tar.gz -C /opt/secrethub-core
          cd /opt/secrethub-core
          export PHX_HOST=secrethub.example.com
          export SECRET_KEY_BASE="\$(openssl rand -base64 48)"
          export DATABASE_URL="postgresql://secrethub:password@postgres/secrethub_prod"
          bin/secrethub_core start
          \`\`\`

          ## Deploy SecretHub Agent

          Download the artifact matching the agent host OS and architecture, then configure it with the Core URL. The agent stores enrollment material under its default state directory.

          \`\`\`bash
          tar -xzf secrethub_agent-${RELEASE_TAG}-linux-amd64.tar.gz -C /opt/secrethub-agent
          cd /opt/secrethub-agent
          export SECRET_HUB_AGENT_CORE_URL=https://secrethub.example.com
          bin/secrethub_agent start
          \`\`\`

          For Windows:

          \`\`\`powershell
          Expand-Archive .\secrethub_agent-${RELEASE_TAG}-windows-amd64.zip -DestinationPath C:\SecretHubAgent
          \$env:SECRET_HUB_AGENT_CORE_URL = "https://secrethub.example.com"
          C:\SecretHubAgent\bin\secrethub_agent.bat start
          \`\`\`

          ## Install SecretHub CLI

          The \`secrethub_cli\` package is published to Hex.pm by this workflow.

          \`\`\`bash
          mix local.hex --force
          mix escript.install hex secrethub_cli ${RELEASE_TAG#v}
          secrethub version
          \`\`\`

          ## Notes

          ${CHANGELOG_LINK}
          EOF

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare-release.outputs.release_sha }}
          PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
        run: |
          set -euo pipefail

          args=(
            release create "$RELEASE_TAG"
            dist/*
            --target "$RELEASE_SHA"
            --title "SecretHub $RELEASE_TAG"
            --notes-file release_notes.md
          )

          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"

      - name: Release summary
        shell: bash
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "Version: ${{ needs.prepare-release.outputs.tag }}"
            echo ""
            echo "Published:"
            echo "- CLI package: Hex.pm secrethub_cli"
            echo "- Core release artifacts: linux amd64, linux arm64"
            echo "- Agent release artifacts: linux amd64, linux arm64, macOS amd64, macOS arm64, Windows amd64, FreeBSD amd64"
            echo "- Docker images: core, core-standalone, agent"
          } >> "$GITHUB_STEP_SUMMARY"
